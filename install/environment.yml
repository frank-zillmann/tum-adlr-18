name: adlr
channels:
  - conda-forge
dependencies:
  - python=3.10
  
  # Deep learning
  # Note: PyTorch is installed separately by setup.sh based on CUDA availability
  - tensorboard
  
  # Core scientific computing
  - numpy
  - scipy
  - matplotlib
  
  # Computer vision and 3D
  - opencv
  - pyrender
  - trimesh
  
  # Robotics and simulation
  - mujoco
  
  # Reinforcement learning
  - gymnasium
  - stable-baselines3
  
  # Utilities
  - pyyaml
  - tqdm
  - rich
  - h5py
  - imageio
  - pillow
  - sympy # Required by PyTorch
  
  # Development and testing
  - pytest
  - pytest-cov
  
  # pip-only packages
  - pip
  - pip:
      # 3D / rendering (pip wheels avoid current conda solver conflict)
      - open3d

      # 3D reconstruction (not available on conda)
      - mesh2sdf

      # nvblox (NVIDIA 3D reconstruction, direct wheel install)
      # VM Image: pytorch-2-7-cu128-ubuntu‑2404‑nvidia‑570
      - https://github.com/nvidia-isaac/nvblox/releases/download/v0.0.9/nvblox_torch-0.0.9+cu12ubuntu24-py3-none-linux_x86_64.whl
